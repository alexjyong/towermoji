<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floor Preview — Towermoji</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body { flex-direction: column; padding-bottom: 2rem; }
    .label {
      color: #888;
      font-family: monospace;
      text-align: center;
      margin-top: 0.5rem;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <div class="label">Floor Preview — side-view cross section | 24px tall, walls on edges</div>
  <script src="../js/game.js"></script>
  <script>
    /* Override default render — we want the showcase */
    window.renderMode = 'preview';

    function renderFloorPreview() {
      // Background behind everything
      drawSky();
      drawClouds();
      drawSkyline();
      drawGround();

      // Stack all 9 floor types above ground level (tower grows upward)
      const startX = 0;
      let y = GROUND_Y - FLOOR_H * FLOOR_TYPES.length;

      for (let i = FLOOR_TYPES.length - 1; i >= 0; i--) {
        drawFloor(startX, y, FLOOR_TYPES[i].name);

        // Name label below each floor's bottom edge (left-aligned)
        ctx.fillStyle = '#FFFFFF';
        ctx.font = '9px monospace';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'bottom';
        ctx.fillText(FLOOR_TYPES[i].name, startX + WALL_W + 2, y - 1);

        y += FLOOR_H;
      }

      // Ground-level marker line
      ctx.strokeStyle = '#FFD70088';
      ctx.lineWidth = 1;
      ctx.setLineDash([6, 4]);
      ctx.beginPath();
      ctx.moveTo(0, GROUND_Y + 0.5);
      ctx.lineTo(CANVAS_WIDTH, GROUND_Y + 0.5);
      ctx.stroke();
      ctx.setLineDash([]);

      // "GROUND" label
      ctx.fillStyle = '#FFD70088';
      ctx.font = '9px monospace';
      ctx.textAlign = 'right';
      ctx.fillText('G', CANVAS_WIDTH - 1, GROUND_Y + FLOOR_H * 0.5);
    }

    renderFloorPreview();
  </script>
</body>
</html>
