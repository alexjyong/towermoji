<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Towermoji — Grid Preview</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    h1 { color: #fff; font-family: monospace; text-align: center; margin: 12px 0 4px; font-size: 18px; }
    p { color: #aaa; font-family: monospace; text-align: center; margin: 0 0 12px; font-size: 12px; }
  </style>
</head>
<body>
  <h1>Towermoji — Tower Grid Preview</h1>
  <p>Pre-built sample tower (9 floors) — no interaction, visual inspection only</p>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <script>
    // Tell game.js this is a preview page — skip auto-render + click handler
    window.preview = 1;
  </script>
  <script src="../js/game.js"></script>
  <script>
    // Build a sample tower in the grid so we can visually inspect all floor types
    // and mixed-use floors.
    initGrid();

    // Row 0  (GF) — Lobby x3
    ensureFloorRow(0);
    towerGrid[0][0] = 'Lobby';
    towerGrid[0][1] = 'Lobby';
    towerGrid[0][2] = 'Lobby';

    // Row 1  — Retail + Restaurant (mixed)
    ensureFloorRow(1);
    towerGrid[1][0] = 'Retail';
    towerGrid[1][1] = 'Retail';
    towerGrid[1][2] = 'Restaurant';

    // Row 2  — Residential x2
    ensureFloorRow(2);
    towerGrid[2][0] = 'Residential';
    towerGrid[2][1] = 'Residential';

    // Row 3  — Office x3
    ensureFloorRow(3);
    towerGrid[3][0] = 'Office';
    towerGrid[3][1] = 'Office';
    towerGrid[3][2] = 'Office';

    // Row 4  — Entertainment + Gym (mixed)
    ensureFloorRow(4);
    towerGrid[4][0] = 'Entertainment';
    towerGrid[4][1] = 'Entertainment';
    towerGrid[4][2] = 'Gym';

    // Row 5  — Storage x2
    ensureFloorRow(5);
    towerGrid[5][0] = 'Storage';
    towerGrid[5][1] = 'Storage';

    // Row 6  — Residential + Office (mixed)
    ensureFloorRow(6);
    towerGrid[6][0] = 'Residential';
    towerGrid[6][1] = 'Residential';
    towerGrid[6][2] = 'Office';

    // Row 7  — Rooftop Garden x1
    ensureFloorRow(7);
    towerGrid[7][0] = 'Rooftop Garden';

    // Render without toolbar (pure inspection)
    renderBackground();
    drawTowerGrid();
  </script>
</body>
</html>
